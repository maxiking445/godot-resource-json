name: Publish new Version

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  determine-version:
    name: Determine next version
    runs-on: ubuntu-latest
    outputs:
      release-tag: ${{ steps.set-tag.outputs.release-tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine next version
        id: set-tag
        shell: bash
        run: |
          set -euo pipefail

          latest_tag=$(git tag --list --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+$' \
            | head -n 1 \
            || true)

          if [[ -z "$latest_tag" ]]; then
            latest_tag="v1.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor <<< "$version"
          release_tag="v${major}.$((minor + 1))"

          echo "Latest tag: $latest_tag"
          echo "New tag: $release_tag"
          echo "release-tag=$release_tag" >> "$GITHUB_OUTPUT"

  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: determine-version

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build release archive
        env:
          RELEASE_TAG: ${{ needs.determine-version.outputs.release-tag }}
        shell: bash
        run: |
          set -euo pipefail

          archive="resourcejson-${RELEASE_TAG}.zip"
          git archive \
            --format=zip \
            --worktree-attributes \
            --output="$archive" \
            "$GITHUB_SHA"

          echo "RELEASE_ARCHIVE=$archive" >> "$GITHUB_ENV"
          unzip -l "$archive"

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.determine-version.outputs.release-tag }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "$RELEASE_TAG" "$RELEASE_ARCHIVE" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --generate-notes
